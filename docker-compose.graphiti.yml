# docker-compose.graphiti.yml
# Always-on Graphiti MCP server + Neo4j backend.
# Deploy on your server and set ec2BaseUrl in SecondBrain Settings.
#
# Setup:
#   OPENAI_API_KEY=<key> docker compose -f docker-compose.graphiti.yml up -d
#
# Graphiti MCP server exposes port 8000 (HTTP/MCP protocol at /mcp/).

services:
  neo4j:
    image: neo4j:5.26.0
    container_name: secondbrain-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/secondbrain_neo4j_pass
      - NEO4J_server_config_strict__validation_enabled=false
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"   # Neo4j browser (internal only)
      - "7687:7687"   # Bolt protocol
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  graphiti:
    image: zepai/knowledge-graph-mcp:standalone
    container_name: secondbrain-graphiti
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    command: ["uv", "run", "--no-sync", "main.py", "--config", "config/config-docker-neo4j.yaml"]
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=secondbrain_neo4j_pass
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GRAPHITI_GROUP_ID=secondbrain
      - SEMAPHORE_LIMIT=10
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/mcp/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  neo4j_data:
  neo4j_logs:
